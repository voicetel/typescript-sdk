name: integration

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Integration tests (read-only)
        env:
          VOICETEL_USERNAME: ${{ secrets.VOICETEL_USERNAME }}
          VOICETEL_PASSWORD: ${{ secrets.VOICETEL_PASSWORD }}
        run: npx vitest run tests/integration.test.ts
