version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "typescript"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # vitest 4.x dropped Node 18 (package.json engines: >=18); pin to 3.x line.
      - dependency-name: "vitest"
        versions: [">=4"]
      - dependency-name: "@vitest/coverage-v8"
        versions: [">=4"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
